<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOUNDMATCH</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    /* ── 테마: Sunburst (기본) ── */
    :root {
      --bg:           #0e0804;
      --surface:      #160e07;
      --surface2:     #1e1409;
      --accent:       #c8650a;
      --gold:         #c9a84c;
      --cream:        #e8dfc8;
      --text:         #e0d4b8;
      --muted:        #6b5840;
      --border:       #2a1e10;
      --red:          #8b1a0a;
      --fret-bg-1:    #1c0e06;
      --fret-bg-2:    #241208;
      --fret-bg-3:    #220f07;
      --btn-active-bg:   rgba(255, 220, 120, 0.92);
      --btn-active-text: #1a0d02;
      --btn-active-glow: rgba(201,168,76,0.55);
      --btn-hover-bg:    rgba(201,168,76,0.07);
      --btn-hover-text:  rgba(232,223,200,0.85);
      /* 노브 테마 */
      --knob-body-hi:  #3d2a1a;
      --knob-body-mid: #1e1208;
      --knob-body-lo:  #0e0804;
      --knob-body-dk:  #080502;
      --knob-ring1:    #3a2c10;
      --knob-ring2:    #c9a84c;
      --knob-ring3:    #2a1e08;
      --knob-ring2-hv: #e8c060;
      --knob-ring1-hv: #4a3818;
      --knob-glow:     rgba(201,168,76,0.2);
      --knob-tick:     rgba(201,168,76,0.35);
      --knob-tick-edge:#c9a84c;
      --knob-num:      rgba(201,168,76,0.45);
      --knob-num-edge: rgba(201,168,76,0.9);
      --knob-marker:   #f0e8d0;
      --panel-bg-1:    #2e1a0a;
      --panel-bg-2:    #1e0e05;
      --panel-bg-3:    #150a03;
    }

    /* ── 테마: Alpine White ── */
    :root.theme-white {
      --bg:           #f0ede6;
      --surface:      #e8e4dc;
      --surface2:     #ddd8ce;
      --accent:       #8b3a1a;
      --gold:         #7a5c2a;
      --cream:        #3a2c18;
      --text:         #2a2018;
      --muted:        #8a7a60;
      --border:       #c8bca8;
      --fret-bg-1:    #2a1a10;
      --fret-bg-2:    #321e12;
      --fret-bg-3:    #281808;
      --btn-active-bg:   rgba(60, 30, 10, 0.88);
      --btn-active-text: #f0ede6;
      --btn-active-glow: rgba(139,58,26,0.5);
      --btn-hover-bg:    rgba(60,40,20,0.07);
      --btn-hover-text:  rgba(40,30,20,0.9);
      --knob-body-hi:  #d8d0c0;
      --knob-body-mid: #c0b898;
      --knob-body-lo:  #a89870;
      --knob-body-dk:  #887848;
      --knob-ring1:    #c0b090;
      --knob-ring2:    #8b3a1a;
      --knob-ring3:    #d8c8a8;
      --knob-ring2-hv: #b84a22;
      --knob-ring1-hv: #d0c0a0;
      --knob-glow:     rgba(139,58,26,0.2);
      --knob-tick:     rgba(100,50,20,0.4);
      --knob-tick-edge:#8b3a1a;
      --knob-num:      rgba(100,50,20,0.5);
      --knob-num-edge: rgba(100,50,20,0.95);
      --knob-marker:   #3a1a08;
      --panel-bg-1:    #e0dace;
      --panel-bg-2:    #d8d2c4;
      --panel-bg-3:    #cec8b8;
    }

    /* ── 테마: Ebony ── */
    :root.theme-ebony {
      --bg:           #080808;
      --surface:      #101010;
      --surface2:     #181818;
      --accent:       #c0c0c0;
      --gold:         #e0e0e0;
      --cream:        #f0f0f0;
      --text:         #d8d8d8;
      --muted:        #606060;
      --border:       #282828;
      --fret-bg-1:    #0c0c0c;
      --fret-bg-2:    #141414;
      --fret-bg-3:    #101010;
      --btn-active-bg:   rgba(220,220,220,0.92);
      --btn-active-text: #080808;
      --btn-active-glow: rgba(200,200,200,0.45);
      --btn-hover-bg:    rgba(220,220,220,0.06);
      --btn-hover-text:  rgba(240,240,240,0.9);
      --knob-body-hi:  #2a2a2a;
      --knob-body-mid: #181818;
      --knob-body-lo:  #0c0c0c;
      --knob-body-dk:  #040404;
      --knob-ring1:    #303030;
      --knob-ring2:    #d0d0d0;
      --knob-ring3:    #1a1a1a;
      --knob-ring2-hv: #f0f0f0;
      --knob-ring1-hv: #484848;
      --knob-glow:     rgba(200,200,200,0.15);
      --knob-tick:     rgba(200,200,200,0.3);
      --knob-tick-edge:#d0d0d0;
      --knob-num:      rgba(200,200,200,0.4);
      --knob-num-edge: rgba(200,200,200,0.9);
      --knob-marker:   #e8e8e8;
      --panel-bg-1:    #141414;
      --panel-bg-2:    #0c0c0c;
      --panel-bg-3:    #101010;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 70% 60% at 50% 40%,
        rgba(200,101,10,0.07) 0%, rgba(92,26,8,0.04) 50%, transparent 80%);
    }
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.18 0.8' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.045'/%3E%3C/svg%3E");
    }

    header {
      position: relative; z-index: 10;
      padding: 48px 60px 0;
      display: flex; align-items: flex-end; justify-content: space-between;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.2em; letter-spacing: 0.12em;
      color: var(--gold); line-height: 1;
      text-shadow: 0 2px 12px rgba(201,168,76,0.2);
    }
    .logo span {
      color: var(--cream); opacity: 0.3; font-size: 0.4em; display: block;
      letter-spacing: 0.35em; font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300; margin-bottom: 4px;
    }

    .header-right { display: flex; align-items: center; gap: 16px; margin-bottom: 8px; }
    .header-line { width: 160px; height: 1px; background: linear-gradient(to right, var(--gold), transparent); }

    .admin-toggle {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 8px 16px; cursor: pointer; font-size: 0.72em;
      font-family: 'Noto Sans KR', sans-serif; letter-spacing: 0.1em;
      transition: all 0.2s; border-radius: 2px;
    }
    .admin-toggle:hover, .admin-toggle.active { border-color: var(--gold); color: var(--gold); }

    main {
      position: relative; z-index: 10;
      max-width: 1100px; margin: 0 auto; padding: 50px 60px 100px;
    }

    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3em, 8vw, 6em); letter-spacing: 0.05em; line-height: 0.92; margin-bottom: 50px;
    }
    .headline em { color: var(--accent); font-style: normal; }

    .section { margin-bottom: 44px; }
    .section-label {
      font-size: 0.62em; letter-spacing: 0.3em; color: var(--gold);
      text-transform: uppercase; margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); max-width: 80px; }

    /* ═══════════════════════════════════════════════════
       기타 프렛보드 — 세로 6칸 × 3열
       실제 로즈우드/에보니 프렛보드 재현
    ═══════════════════════════════════════════════════ */
    .fretboard-wrap {
      position: relative;
    }

    /* 넥 측면 바인딩 — 위아래 크림색 줄 */
    .fretboard-wrap::before,
    .fretboard-wrap::after {
      content: '';
      position: absolute; left: 0; right: 0; height: 5px;
      background: linear-gradient(90deg,
        #c9a84c 0%, #e8d898 15%, #c9a84c 30%, #e8d898 50%, #c9a84c 70%, #e8d898 85%, #c9a84c 100%
      );
      z-index: 10;
      box-shadow: 0 0 8px rgba(201,168,76,0.4);
    }
    .fretboard-wrap::before { top: 0; border-radius: 3px 3px 0 0; }
    .fretboard-wrap::after  { bottom: 0; border-radius: 0 0 3px 3px; }

    .fretboard {
      display: grid;
      grid-template-columns: 
        /* 사이드 인레이 도트 칸 */ 28px
        /* 장르 버튼 3열 */ 1fr 1fr 1fr
        /* 사이드 인레이 도트 칸 */ 28px;

      position: relative;
      overflow: hidden;

      /* 로즈우드 목재 질감 */
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0px, transparent 6px,
          rgba(0,0,0,0.04) 6px, rgba(0,0,0,0.04) 7px
        ),
        repeating-linear-gradient(
          180deg,
          transparent 0px, transparent 3px,
          rgba(255,255,255,0.012) 3px, rgba(255,255,255,0.012) 4px
        ),
        linear-gradient(175deg,
          var(--fret-bg-1) 0%, var(--fret-bg-2) 15%, var(--fret-bg-1) 30%,
          var(--fret-bg-3) 45%, var(--fret-bg-1) 60%, var(--fret-bg-2) 75%,
          var(--fret-bg-1) 100%
        );

      box-shadow:
        0 0 0 1px rgba(201,168,76,0.4),
        0 0 0 3px #0e0804,
        0 0 0 4px rgba(201,168,76,0.2),
        0 12px 48px rgba(0,0,0,0.9),
        inset 0 0 60px rgba(0,0,0,0.3);
    }

    /* ─── 사이드 도트 (왼쪽/오른쪽 포지션 마커) ─── */
    .fret-side {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-around;
      padding: 6px 0;
      position: relative;
      z-index: 2;
    }

    .side-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%,
        #ffffff 0%, #d4e8ec 30%, #8abfc8 60%, #4a8a94 100%
      );
      box-shadow:
        0 0 4px rgba(122,200,208,0.6),
        inset 0 1px 2px rgba(255,255,255,0.8);
      opacity: 0;  /* 인레이 있는 프렛만 표시 */
      transition: opacity 0.2s;
    }
    /* 인레이 위치: 프렛 3,5,7,9,12,15... (0-indexed 2,4,6,8,11,14) */
    .side-dot.visible { opacity: 1; }

    /* ─── 프렛 와이어 (가로 금속줄) ─── */
    .fret-wire-row {
      grid-column: 1 / -1;
      height: 3px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.05) 0%,
        #c9a84c 20%,
        #e8d898 50%,
        #c9a84c 80%,
        rgba(100,80,20,0.3) 100%
      );
      box-shadow:
        0 1px 4px rgba(0,0,0,0.8),
        0 -1px 2px rgba(201,168,76,0.3),
        inset 0 0 3px rgba(255,240,180,0.4);
      position: relative;
      z-index: 4;
    }

    /* ─── 프렛 셀 구역 (6줄) ─── */
    .fret-row-group {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 28px 1fr 1fr 1fr 28px;
      position: relative;
    }

    /* 스트링 6줄 오버레이 */
    .fret-row-group::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;
      background: repeating-linear-gradient(
        90deg,
        transparent 0%,
        transparent calc(20% - 0.7px),
        rgba(210,200,165,0.12) calc(20% - 0.7px),
        rgba(210,200,165,0.12) 20%
      );
    }

    /* ─── 장르 버튼 ─── */
    .fret-btn {
      padding: 16px 6px 16px;
      background: transparent;
      border: none;
      border-right: 1px solid rgba(201,168,76,0.07);
      color: var(--muted);
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.74em;
      font-weight: 300;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: all 0.14s ease;
      position: relative;
      text-align: center;
      z-index: 5;
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .fret-btn:last-of-type { border-right: none; }
    .fret-btn:hover {
      color: var(--btn-hover-text);
      background: var(--btn-hover-bg);
    }

    /* ─── 선택 상태: 심플 브라이트 하이라이트 ─── */
    .fret-btn.active {
      color: var(--btn-active-text);
      background: var(--btn-active-bg);
      box-shadow:
        inset 0 1px 3px rgba(255,255,255,0.3),
        inset 0 -1px 2px rgba(0,0,0,0.15),
        0 0 14px var(--btn-active-glow),
        0 0 4px var(--btn-active-glow);
    }
    .fret-btn.active::before { display: none; }
    .fret-btn.active::after  { display: none; }

    .fret-btn span {
      position: relative;
      z-index: 2;
      font-size: 0.95em;
      letter-spacing: 0.02em;
      transition: all 0.14s;
      white-space: nowrap;
    }

    .fret-btn.active span {
      color: var(--btn-active-text);
      font-weight: 500;
    }

    /* ─── 프렛 번호 인디케이터 (측면) ─── */
    .fret-number {
      position: absolute;
      right: 6px; top: 50%;
      transform: translateY(-50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.6em;
      color: rgba(201,168,76,0.18);
      letter-spacing: 0.05em;
      z-index: 6;
      pointer-events: none;
    }

    /* ─── 넛 (최상단 흰 뼈대) ─── */
    .fret-nut {
      grid-column: 1 / -1;
      height: 7px;
      background: linear-gradient(180deg,
        #f5f0e0 0%, #e8dfca 40%, #c8b878 70%, #a09050 100%
      );
      box-shadow:
        0 2px 6px rgba(0,0,0,0.7),
        0 0 12px rgba(200,184,120,0.3),
        inset 0 1px 2px rgba(255,255,255,0.6);
      position: relative;
      z-index: 5;
    }

    /* ─── 전체 프렛보드 사이드 도트 위치 지정 ─── */
    /* 인레이 있는 프렛: 3번(idx2), 5번(idx4), 7번(idx6), 9번(idx8), 12번(idx11=두개), 15번(idx14) */

    /* ══════════════════════════════════════════
       깁슨 레스폴 60s 컨트롤 패널
    ══════════════════════════════════════════ */
    .guitar-panel {
      position: relative;
      border-radius: 6px 6px 40px 40px;
      padding: 36px 48px 40px;
      overflow: hidden;
      background:
        repeating-linear-gradient(
          92deg,
          transparent 0px, transparent 22px,
          rgba(255,255,255,0.008) 22px, rgba(255,255,255,0.008) 23px
        ),
        repeating-linear-gradient(
          180deg,
          transparent 0px, transparent 60px,
          rgba(0,0,0,0.06) 60px, rgba(0,0,0,0.06) 61px
        ),
        linear-gradient(160deg, var(--panel-bg-1) 0%, var(--panel-bg-2) 40%, var(--panel-bg-3) 100%);
      box-shadow:
        0 0 0 1px var(--border),
        0 0 0 3px var(--bg),
        0 12px 60px rgba(0,0,0,0.9),
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -1px 0 rgba(0,0,0,0.5);
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }
    .guitar-panel::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg,
        rgba(212,207,200,0.12) 0%, transparent 30%,
        transparent 70%, rgba(212,207,200,0.06) 100%
      );
      pointer-events: none;
    }
    .panel-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.75em; letter-spacing: 0.55em;
      color: rgba(201,168,76,0.22);
      text-align: center; margin-bottom: 36px;
      text-transform: uppercase;
    }

    .knobs-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      justify-items: center;
    }

    .knob-unit {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }

    .knob-outer {
      width: 96px; height: 96px;
      border-radius: 50%;
      position: relative; cursor: pointer;
      user-select: none;
      background: radial-gradient(ellipse at 36% 28%,
        var(--knob-body-hi) 0%, var(--knob-body-mid) 35%,
        var(--knob-body-lo) 70%, var(--knob-body-dk) 100%
      );
      box-shadow:
        0 8px 32px rgba(0,0,0,0.95),
        0 3px 10px rgba(0,0,0,0.8),
        0 0 0 3px var(--knob-ring1),
        0 0 0 4px var(--knob-ring2),
        0 0 0 6px var(--knob-ring3),
        inset 0 2px 4px rgba(255,255,255,0.06),
        inset 0 -3px 8px rgba(0,0,0,0.7);
      transition: box-shadow 0.15s ease, background 0.4s ease;
    }
    .knob-outer:hover {
      box-shadow:
        0 8px 32px rgba(0,0,0,0.95),
        0 3px 10px rgba(0,0,0,0.8),
        0 0 0 3px var(--knob-ring1-hv),
        0 0 0 4px var(--knob-ring2-hv),
        0 0 0 6px var(--knob-ring3),
        0 0 18px var(--knob-glow),
        inset 0 2px 4px rgba(255,255,255,0.09),
        inset 0 -3px 8px rgba(0,0,0,0.7);
    }
    .knob-outer::before {
      content: '';
      position: absolute;
      top: 8%; left: 14%; width: 34%; height: 26%;
      background: radial-gradient(ellipse,
        rgba(255,240,190,0.28) 0%, rgba(255,220,140,0.08) 60%, transparent 100%
      );
      border-radius: 50%;
      pointer-events: none;
    }
    .knob-scale {
      position: absolute;
      inset: -18px;
      pointer-events: none;
    }
    .knob-marker {
      position: absolute;
      width: 3px; height: 18px;
      background: linear-gradient(to bottom, var(--knob-marker) 0%, rgba(200,180,150,0.6) 100%);
      border-radius: 1.5px;
      top: 6px; left: 50%;
      transform-origin: 50% calc(96px / 2 - 6px);
      transform: translateX(-50%) rotate(0deg);
      transition: transform 0.25s cubic-bezier(.25,.8,.25,1), background 0.4s ease, box-shadow 0.4s ease;
      box-shadow: 0 0 6px var(--knob-glow);
      pointer-events: none;
    }

    .step-btns {
      display: flex; align-items: center; gap: 6px;
    }
    .step-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9em; font-family: 'Bebas Neue', sans-serif;
      cursor: pointer; transition: all 0.15s; border-radius: 2px;
      line-height: 1;
    }
    .step-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--surface); }

    .step-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3em;
      color: var(--gold);
      min-width: 22px;
      text-align: center;
      letter-spacing: 0.05em;
      text-shadow: 0 0 8px rgba(201,168,76,0.4);
    }

    .knob-name {
      font-size: 0.6em; letter-spacing: 0.22em;
      color: rgba(201,168,76,0.5);
      text-transform: uppercase; text-align: center;
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* 찾기 버튼 */
    .find-btn {
      width: 100%; padding: 18px;
      background: transparent;
      border: 1px solid var(--gold); color: var(--gold);
      font-family: 'Bebas Neue', sans-serif; font-size: 1.4em; letter-spacing: 0.3em;
      cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; margin-top: 8px;
    }
    .find-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, var(--accent), var(--gold)); transform: translateX(-100%); transition: transform 0.3s; z-index: 0; }
    .find-btn:hover::before { transform: translateX(0); }
    .find-btn:hover { color: #0e0804; }
    .find-btn span { position: relative; z-index: 1; }

    #results { margin-top: 64px; display: none; }
    #results.visible { display: block; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .results-header {
      font-family: 'Bebas Neue', sans-serif; font-size: 2em; letter-spacing: 0.1em;
      margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 16px;
      display: flex; align-items: baseline; gap: 12px;
    }
    .results-header em { color: var(--accent); font-style: normal; font-size: 0.6em; }

    /* 결과 + 미리보기 레이아웃 */
    .results-body {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 24px;
      align-items: start;
    }

    .result-list { display: flex; flex-direction: column; gap: 2px; }
    .result-item {
      display: flex; align-items: center; gap: 24px;
      padding: 20px 24px; background: var(--surface);
      border-left: 2px solid transparent; transition: all 0.2s;
      text-decoration: none; color: inherit;
      cursor: pointer;
    }
    .result-item:hover { border-left-color: var(--accent); background: var(--surface2); }
    .result-item.playing { border-left-color: var(--gold); background: var(--surface2); }
    .result-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.4em; color: var(--border); min-width: 32px; }
    .result-num.playing-num { color: var(--gold); }
    .result-info { flex: 1; }
    .result-title { font-size: 0.95em; font-weight: 500; margin-bottom: 4px; }
    .result-artist { font-size: 0.78em; color: var(--muted); }
    .result-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .result-tag { font-size: 0.65em; padding: 3px 10px; border: 1px solid var(--border); color: var(--muted); }
    .result-play-icon {
      color: var(--gold); font-size: 1em; opacity: 0.4;
      transition: opacity 0.2s, transform 0.2s;
      min-width: 20px; text-align: center;
    }
    .result-item:hover .result-play-icon { opacity: 1; transform: scale(1.2); }
    .result-item.playing .result-play-icon { opacity: 1; color: var(--gold); }

    /* 미리보기 패널 */
    .preview-panel {
      position: sticky;
      top: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .preview-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .preview-title-area { flex: 1; min-width: 0; }
    .preview-song-title {
      font-size: 0.88em; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .preview-song-artist { font-size: 0.72em; color: var(--muted); margin-top: 2px; }
    .preview-close {
      background: transparent; border: none; color: var(--muted);
      cursor: pointer; font-size: 1.1em; padding: 2px 6px;
      transition: color 0.2s; flex-shrink: 0;
    }
    .preview-close:hover { color: var(--text); }
    .preview-embed {
      position: relative; width: 100%; padding-bottom: 56.25%;
      background: #000;
    }
    .preview-embed iframe {
      position: absolute; inset: 0; width: 100%; height: 100%;
      border: none;
    }
    .preview-placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; color: var(--muted);
    }
    .preview-placeholder-icon { font-size: 2.5em; opacity: 0.3; }
    .preview-placeholder-text { font-size: 0.72em; letter-spacing: 0.12em; opacity: 0.5; }
    .preview-open-btn {
      display: block; width: 100%; padding: 12px;
      background: transparent; border: none;
      border-top: 1px solid var(--border);
      color: var(--gold); font-family: 'Bebas Neue', sans-serif;
      font-size: 0.85em; letter-spacing: 0.2em;
      cursor: pointer; transition: background 0.2s; text-align: center;
      text-decoration: none;
    }
    .preview-open-btn:hover { background: var(--surface2); }

    .no-results { text-align: center; padding: 60px 0; color: var(--muted); font-size: 0.9em; letter-spacing: 0.1em; display: none; }
    .no-results.visible { display: block; }

    /* 관리자 */
    #admin-panel { display: none; margin-top: 64px; border-top: 1px solid var(--border); padding-top: 48px; }
    #admin-panel.visible { display: block; animation: fadeUp 0.3s ease; }
    .admin-header { font-family: 'Bebas Neue', sans-serif; font-size: 2em; letter-spacing: 0.1em; margin-bottom: 32px; }
    .admin-header em { color: var(--accent); font-style: normal; }

    .add-form { background: var(--surface); padding: 32px; margin-bottom: 40px; border-left: 2px solid var(--accent); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
    .form-field { position: relative; }
    .form-field input {
      width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
      padding: 12px 16px; font-family: 'Noto Sans KR', sans-serif; font-size: 0.85em;
      outline: none; transition: border-color 0.2s; border-radius: 2px;
    }
    .form-field input:focus { border-color: var(--gold); }
    .form-field input::placeholder { color: var(--muted); }
    .form-field .field-label {
      position: absolute; top: -9px; left: 10px;
      background: var(--surface); padding: 0 6px;
      font-size: 0.62em; color: var(--gold); letter-spacing: 0.15em;
    }

    .form-genres { margin-bottom: 20px; }
    .form-genres-label { font-size: 0.65em; color: var(--gold); letter-spacing: 0.2em; margin-bottom: 10px; }

    .form-knob-panel {
      background: var(--bg);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 20px 24px 16px; margin-bottom: 20px;
      background:
        repeating-linear-gradient(92deg, transparent 0px, transparent 22px, rgba(255,255,255,0.005) 22px, rgba(255,255,255,0.005) 23px),
        linear-gradient(160deg, #1e1208 0%, #120a04 100%);
    }
    .form-panel-label { font-size: 0.58em; letter-spacing: 0.3em; color: rgba(201,168,76,0.25); margin-bottom: 16px; font-family: 'Bebas Neue', sans-serif; }
    .form-knobs-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; justify-items: center; }

    .add-btn {
      width: 100%; padding: 14px; background: transparent;
      border: 1px solid var(--gold); color: var(--gold);
      font-family: 'Bebas Neue', sans-serif; font-size: 1.1em; letter-spacing: 0.25em;
      cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
    }
    .add-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, var(--accent), var(--gold)); transform: translateX(-100%); transition: transform 0.2s; z-index: 0; }
    .add-btn:hover::before { transform: translateX(0); }
    .add-btn:hover { color: #0e0804; }
    .add-btn span { position: relative; z-index: 1; }

    .admin-list { display: flex; flex-direction: column; gap: 2px; }
    .admin-item { display: flex; align-items: center; gap: 20px; padding: 16px 20px; background: var(--surface); }
    .admin-item:hover { background: var(--surface2); }
    .admin-item-info { flex: 1; }
    .admin-item-title { font-size: 0.9em; font-weight: 500; margin-bottom: 3px; }
    .admin-item-artist { font-size: 0.75em; color: var(--muted); }
    .admin-item-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .admin-item-tag { font-size: 0.6em; padding: 2px 8px; border: 1px solid var(--border); color: var(--muted); }
    .delete-btn {
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      padding: 6px 14px; cursor: pointer; font-size: 0.75em;
      font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; border-radius: 2px; white-space: nowrap;
    }
    .delete-btn:hover { border-color: var(--red); color: var(--red); }

    .song-count { font-size: 0.72em; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 16px; }
    .song-count em { color: var(--accent); font-style: normal; }

    .toast {
      position: fixed; bottom: 32px; right: 32px;
      background: var(--accent); color: #000; padding: 12px 24px;
      font-size: 0.82em; font-weight: 500; letter-spacing: 0.08em;
      z-index: 9999; opacity: 0; transform: translateY(10px);
      transition: all 0.3s; pointer-events: none; border-radius: 2px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }


    /* ══ 레스폴 3웨이 픽업 셀렉터 ══ */
    .pickup-selector {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      user-select: none;
    }

    .pickup-selector-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.52em;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* 포지션 레이블 (NECK / MID / BRIDGE) */
    .pickup-pos-labels {
      display: flex;
      justify-content: space-between;
      width: 130px;
      padding: 0 2px;
    }
    .pickup-pos-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.46em;
      letter-spacing: 0.1em;
      color: var(--muted);
      opacity: 0.5;
      transition: color 0.25s, opacity 0.25s;
      cursor: pointer;
    }
    .pickup-pos-label.active {
      color: var(--gold);
      opacity: 1;
    }


    /* ══ 레스폴 픽업 셀렉터 — SVG 부채꼴 스윙 ══ */
    .pickup-selector {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      user-select: none;
    }
    .pickup-selector-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.52em;
      letter-spacing: 0.28em;
      color: var(--muted);
      white-space: nowrap;
    }
    .pickup-svg { display: block; cursor: pointer; overflow: visible; }
    .pickup-theme-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.46em;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-align: center;
      min-width: 90px;
      transition: color 0.3s;
    }
    /* 레버는 JS로 직접 재드로잉 */

    /* 바디 전환 애니메이션 */
    body { transition: background 0.4s ease, color 0.3s ease; }
    main, header { transition: color 0.3s ease; }

    @media (max-width: 700px) {
      header { padding: 40px 24px 0; }
      main { padding: 40px 24px 80px; }
      .headline { font-size: 3em; }
      .knobs-row, .form-knobs-row { grid-template-columns: repeat(2, 1fr); gap: 24px; }
      .form-grid { grid-template-columns: 1fr; }
      .pickup-selector { display: none; }
      .results-body { grid-template-columns: 1fr; }
      .preview-panel { position: static; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span>DISCOVER YOUR SOUND</span>
    SOUNDMATCH
  </div>
  <div class="header-right">
    <!-- 레스폴 픽업 셀렉터 — 원근감 세로 토글 -->
    <div class="pickup-selector">
      <div class="pickup-selector-label">PICKUP SELECT</div>

      <svg id="pickup-svg" class="pickup-svg" width="90" height="120" viewBox="0 0 90 120"
        style="filter:drop-shadow(0 6px 20px rgba(0,0,0,0.95))">
        <defs>
          <radialGradient id="pg" cx="38%" cy="32%" r="68%">
            <stop offset="0%"   stop-color="#c8c8c8"/>
            <stop offset="35%"  stop-color="#989898"/>
            <stop offset="70%"  stop-color="#606060"/>
            <stop offset="100%" stop-color="#303030"/>
          </radialGradient>
          <radialGradient id="ringG" cx="50%" cy="25%" r="75%">
            <stop offset="0%"   stop-color="#888"/>
            <stop offset="100%" stop-color="#222"/>
          </radialGradient>
          <linearGradient id="slotG" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#060606"/>
            <stop offset="50%"  stop-color="#161616"/>
            <stop offset="100%" stop-color="#060606"/>
          </linearGradient>
          <linearGradient id="shaftG" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#0e0802"/>
            <stop offset="30%"  stop-color="#32200a"/>
            <stop offset="50%"  stop-color="#402a10"/>
            <stop offset="70%"  stop-color="#32200a"/>
            <stop offset="100%" stop-color="#0e0802"/>
          </linearGradient>
          <radialGradient id="tipG" cx="34%" cy="26%" r="62%">
            <stop offset="0%"   stop-color="#f8f4e8"/>
            <stop offset="45%"  stop-color="#ddd4b0"/>
            <stop offset="80%"  stop-color="#b8a878"/>
            <stop offset="100%" stop-color="#9a8858"/>
          </radialGradient>
          <radialGradient id="tipHi" cx="30%" cy="22%" r="52%">
            <stop offset="0%"   stop-color="rgba(255,252,240,0.88)"/>
            <stop offset="100%" stop-color="rgba(255,252,240,0)"/>
          </radialGradient>
          <linearGradient id="rimSideG" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="rgba(0,0,0,0.38)"/>
            <stop offset="30%"  stop-color="rgba(0,0,0,0.06)"/>
            <stop offset="70%"  stop-color="rgba(0,0,0,0.06)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0.42)"/>
          </linearGradient>
          <filter id="sh">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.88)"/>
          </filter>
          <filter id="slotSh">
            <feDropShadow dx="0" dy="0" stdDeviation="1.5" flood-color="rgba(0,0,0,1)"/>
          </filter>
        </defs>

        <!-- 원형 플레이트 링 -->
        <circle cx="45" cy="60" r="40" fill="url(#ringG)" stroke="#141414" stroke-width="1.2"/>
        <circle cx="45" cy="60" r="37" fill="url(#pg)"/>
        <ellipse cx="38" cy="38" rx="13" ry="7" fill="rgba(255,255,255,0.09)"/>

        <!-- 레이블 -->
        <text id="svg-lbl-0" x="45" y="26"
          font-family="'Bebas Neue',sans-serif" font-size="8.5"
          fill="#c9a84c" letter-spacing="1" text-anchor="middle"
          style="cursor:pointer" onclick="setTheme(0)">NECK</text>
        <text id="svg-lbl-2" x="45" y="98"
          font-family="'Bebas Neue',sans-serif" font-size="8.5"
          fill="#6b5840" letter-spacing="1" text-anchor="middle"
          style="cursor:pointer" onclick="setTheme(2)">BRIDGE</text>

        <!-- 세로 슬롯 홈 -->
        <rect x="40" y="30" width="10" height="60" rx="5"
          fill="url(#slotG)" filter="url(#slotSh)" stroke="#050505" stroke-width="0.8"/>
        <rect x="41.2" y="31.5" width="2" height="57" rx="1"
          fill="rgba(255,255,255,0.03)"/>
        <rect x="38.5" y="59.2" width="13" height="1.5" rx="0.75"
          fill="rgba(255,255,255,0.10)"/>

        <!-- 레버 (JS로 그림) -->
        <g id="lever-group"></g>

        <!-- 클릭 존 -->
        <rect x="18" y="18" width="54" height="32" fill="transparent" style="cursor:pointer" onclick="setTheme(0)"/>
        <rect x="18" y="50" width="54" height="20" fill="transparent" style="cursor:pointer" onclick="setTheme(1)"/>
        <rect x="18" y="70" width="54" height="32" fill="transparent" style="cursor:pointer" onclick="setTheme(2)"/>
      </svg>

      <div class="pickup-theme-name" id="theme-name">SUNBURST</div>
    </div>
    <button class="admin-toggle" id="admin-toggle" onclick="toggleAdmin()">+ 곡 관리</button>
    <div class="header-line"></div>
  </div>
</header>

<main>
  <h1 class="headline">당신의<br><em>락</em>을<br>찾아서</h1>

  <div class="section">
    <div class="section-label">장르 선택</div>
    <div class="fretboard-wrap">
      <div class="fretboard" id="genre-tags">
        <!-- 넛 -->
        <div class="fret-nut"></div>

        <!-- 프렛 1 (인레이 없음) -->
        <div class="fret-wire-row"></div>
        <div class="fret-row-group">
          <div class="fret-side"><div class="side-dot"></div></div>
          <button class="fret-btn" data-value="인디 록"><span>인디 록</span></button>
          <button class="fret-btn" data-value="얼터너티브 록"><span>얼터너티브 록</span></button>
          <button class="fret-btn" data-value="하드 록"><span>하드 록</span></button>
          <div class="fret-side"><div class="side-dot"></div></div>
        </div>

        <!-- 프렛 2 (인레이 없음) -->
        <div class="fret-wire-row"></div>
        <div class="fret-row-group">
          <div class="fret-side"><div class="side-dot"></div></div>
          <button class="fret-btn" data-value="인디 팝"><span>인디 팝</span></button>
          <button class="fret-btn" data-value="소프트 록"><span>소프트 록</span></button>
          <button class="fret-btn" data-value="포크 록"><span>포크 록</span></button>
          <div class="fret-side"><div class="side-dot"></div></div>
        </div>

        <!-- 프렛 3 (인레이 도트) -->
        <div class="fret-wire-row"></div>
        <div class="fret-row-group" style="position:relative">
          <div class="fret-side"><div class="side-dot visible"></div></div>
          <button class="fret-btn" data-value="포스트 록"><span>포스트 록</span></button>
          <button class="fret-btn" data-value="브릿팝"><span>브릿팝</span></button>
          <button class="fret-btn" data-value="아트 록"><span>아트 록</span></button>
          <div class="fret-side"><div class="side-dot visible"></div></div>
        </div>

        <!-- 프렛 4 (인레이 없음) -->
        <div class="fret-wire-row"></div>
        <div class="fret-row-group">
          <div class="fret-side"><div class="side-dot"></div></div>
          <button class="fret-btn" data-value="사이키델릭 록"><span>사이키델릭 록</span></button>
          <button class="fret-btn" data-value="드림 팝"><span>드림 팝</span></button>
          <button class="fret-btn" data-value="포스트 펑크"><span>포스트 펑크</span></button>
          <div class="fret-side"><div class="side-dot"></div></div>
        </div>

        <!-- 프렛 5 (인레이 도트) -->
        <div class="fret-wire-row"></div>
        <div class="fret-row-group">
          <div class="fret-side"><div class="side-dot visible"></div></div>
          <button class="fret-btn" data-value="개러지 록"><span>개러지 록</span></button>
          <button class="fret-btn" data-value="이모"><span>이모</span></button>
          <button class="fret-btn" data-value="글램 록"><span>글램 록</span></button>
          <div class="fret-side"><div class="side-dot visible"></div></div>
        </div>

        <!-- 프렛 6 (인레이 없음) -->
        <div class="fret-wire-row"></div>
        <div class="fret-row-group">
          <div class="fret-side"><div class="side-dot"></div></div>
          <button class="fret-btn" data-value="펑크 록"><span>펑크 록</span></button>
          <button class="fret-btn" data-value="슈게이징"><span>슈게이징</span></button>
          <button class="fret-btn" data-value="뉴 웨이브"><span>뉴 웨이브</span></button>
          <div class="fret-side"><div class="side-dot"></div></div>
        </div>

        <div class="fret-wire-row"></div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">분위기 다이얼</div>
    <div class="guitar-panel">
      <div class="panel-label">GIBSON · LES PAUL STANDARD · 60s</div>
      <div class="knobs-row" id="main-knobs"></div>
    </div>
  </div>

  <button class="find-btn" onclick="findMusic()"><span>✦ 음악 찾기</span></button>

  <div class="no-results" id="no-results"></div>
  <div id="results">
    <div class="results-header">추천 결과 <em id="result-count"></em></div>
    <div class="results-body">
      <div class="result-list" id="result-list"></div>
      <div class="preview-panel" id="preview-panel">
        <div class="preview-header">
          <div class="preview-title-area">
            <div class="preview-song-title" id="preview-song-title">곡을 선택하세요</div>
            <div class="preview-song-artist" id="preview-song-artist">← 왼쪽 목록에서 클릭</div>
          </div>
          <button class="preview-close" onclick="closePreview()" title="닫기">✕</button>
        </div>
        <div class="preview-embed" id="preview-embed">
          <div class="preview-placeholder">
            <div class="preview-placeholder-icon">♪</div>
            <div class="preview-placeholder-text">PREVIEW</div>
          </div>
        </div>
        <a class="preview-open-btn" id="preview-open-btn" href="#" target="_blank">↗ 유튜브에서 열기</a>
      </div>
    </div>

<script>
  const KNOB_DEFS = [
    { id: 'emotion', name: '감성' },
    { id: 'energy',  name: '에너지' },
    { id: 'calm',    name: '잔잔함' },
    { id: 'dark',    name: '어두움' },
  ];

  const MIN = 1, MAX = 10, DEFAULT = 5;
  function valToAngle(v) { return -135 + (v - 1) / 9 * 270; }

  const state = {};
  KNOB_DEFS.forEach(k => { state[k.id] = DEFAULT; state['f-'+k.id] = DEFAULT; });

  function buildKnob(id, name, prefix, mini) {
    const fid = prefix + id;
    const sz  = mini ? 64 : 96;
    const mh  = mini ? 12 : 18;
    const mo  = `calc(${sz}px / 2 - 6px)`;

    const r = sz / 2 + 14;
    const cx = r, cy = r;
    const totalDeg = 270;
    const startDeg = -135;
    let ticks = '';
    for (let i = 1; i <= 10; i++) {
      const deg = startDeg + ((i - 1) / 9) * totalDeg;
      const rad = (deg - 90) * Math.PI / 180;
      const inner = r - 7;
      const outer = r - 2;
      const x1 = cx + inner * Math.cos(rad);
      const y1 = cy + inner * Math.sin(rad);
      const x2 = cx + outer * Math.cos(rad);
      const y2 = cy + outer * Math.sin(rad);
      const nr  = r + (mini ? 9 : 11);
      const nx  = cx + nr * Math.cos(rad);
      const ny  = cy + nr * Math.sin(rad);
      const isEdge = i === 1 || i === 10;
      ticks += `
        <line class="knob-tick-line${isEdge ? ' knob-tick-edge' : ''}"
          x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"
          stroke-width="${isEdge ? 1.5 : 1}" stroke-linecap="round"/>
        <text class="knob-tick-num${isEdge ? ' knob-tick-num-edge' : ''}"
          x="${nx.toFixed(1)}" y="${ny.toFixed(1)}"
          font-family="Bebas Neue, sans-serif"
          font-size="${mini ? 7 : 9}"
          text-anchor="middle" dominant-baseline="middle">${i}</text>
      `;
    }
    const svgSize = (r + 18) * 2;

    return `
      <div class="knob-unit">
        <div style="position:relative;width:${sz + 48}px;height:${sz + 48}px;display:flex;align-items:center;justify-content:center;">
          <svg width="${svgSize}" height="${svgSize}"
            style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;overflow:visible">
            ${ticks}
          </svg>
          <div class="knob-outer" id="outer-${fid}"
            style="width:${sz}px;height:${sz}px;flex-shrink:0"
            onclick="clickStep('${fid}')"
            onwheel="wheelStep(event,'${fid}')">
            <div class="knob-marker" id="marker-${fid}"
              style="height:${mh}px;transform-origin:50% ${mo};transform:translateX(-50%) rotate(0deg)"></div>
          </div>
        </div>
        <div class="step-btns">
          <button class="step-btn" onclick="setVal('${fid}',state['${fid}']-1)">−</button>
          <span class="step-val" id="sval-${fid}">5</span>
          <button class="step-btn" onclick="setVal('${fid}',state['${fid}']+1)">+</button>
        </div>
        <div class="knob-name">${name}</div>
      </div>
    `;
  }

  /* SVG 눈금 색상을 현재 테마 CSS 변수에서 읽어서 동기화 */
  function updateKnobSVGs() {
    const style = getComputedStyle(document.documentElement);
    const tick     = style.getPropertyValue('--knob-tick').trim();
    const tickEdge = style.getPropertyValue('--knob-tick-edge').trim();
    const num      = style.getPropertyValue('--knob-num').trim();
    const numEdge  = style.getPropertyValue('--knob-num-edge').trim();
    const marker   = style.getPropertyValue('--knob-marker').trim();
    const glow     = style.getPropertyValue('--knob-glow').trim();

    document.querySelectorAll('.knob-tick-line').forEach(el => {
      el.setAttribute('stroke', tick);
    });
    document.querySelectorAll('.knob-tick-line.knob-tick-edge').forEach(el => {
      el.setAttribute('stroke', tickEdge);
    });
    document.querySelectorAll('.knob-tick-num').forEach(el => {
      el.setAttribute('fill', num);
    });
    document.querySelectorAll('.knob-tick-num.knob-tick-num-edge').forEach(el => {
      el.setAttribute('fill', numEdge);
    });
    document.querySelectorAll('.knob-marker').forEach(el => {
      el.style.background = `linear-gradient(to bottom, ${marker} 0%, ${marker}99 100%)`;
      el.style.boxShadow  = `0 0 6px ${glow}`;
    });
  }

  document.getElementById('main-knobs').innerHTML =
    KNOB_DEFS.map(k => buildKnob(k.id, k.name, '', false)).join('');
  document.getElementById('form-knobs').innerHTML =
    KNOB_DEFS.map(k => buildKnob(k.id, k.name, 'f-', true)).join('');

  function applyVal(fid) {
    const v = state[fid];
    const marker = document.getElementById(`marker-${fid}`);
    const valEl  = document.getElementById(`sval-${fid}`);
    if (marker) marker.style.transform = `translateX(-50%) rotate(${valToAngle(v)}deg)`;
    if (valEl)  valEl.textContent = v;
  }

  function setVal(fid, v) {
    state[fid] = Math.max(MIN, Math.min(MAX, v));
    applyVal(fid);
  }

  function clickStep(fid) {
    state[fid] = state[fid] >= MAX ? MIN : state[fid] + 1;
    applyVal(fid);
  }

  function wheelStep(e, fid) {
    e.preventDefault();
    setVal(fid, state[fid] + (e.deltaY > 0 ? -1 : 1));
  }

  [...Object.keys(state)].forEach(applyVal);

  function findMusic() {
    const genres = [...document.querySelectorAll('#genre-tags .fret-btn.active')].map(t => t.dataset.value);
    if (!songs.length) { showNoResults('아직 곡이 없어요. "+ 곡 관리" 에서 추가해보세요!'); return; }

    let list = songs.map(s => {
      // 무드 거리 (4개 축 합산, 각 0~9)
      const moodDist =
        Math.abs(state.emotion - s.mood.emotion) +
        Math.abs(state.energy  - s.mood.energy)  +
        Math.abs(state.calm    - s.mood.calm)     +
        Math.abs(state.dark    - s.mood.dark);

      // 장르 보너스: 선택 장르와 일치할수록 점수 감소 (최대 -12)
      const genreMatch = genres.length
        ? genres.filter(g => s.genres.includes(g)).length
        : 0;
      const genreBonus = genreMatch * 3; // 일치 장르 1개당 3점 감소

      const score = moodDist - genreBonus;
      return { ...s, score, genreMatch };
    });

    // 장르가 선택된 경우 — 일치 장르 없는 곡은 제외
    if (genres.length) {
      list = list.filter(s => s.genreMatch > 0);
    }

    if (!list.length) { showNoResults('조건에 맞는 곡이 없어요. 장르 필터를 바꿔보세요.'); return; }

    // 점수 낮은 순 정렬 후 상위 5곡만
    list = list.sort((a, b) => a.score - b.score).slice(0, 5);

    document.getElementById('no-results').classList.remove('visible');
    document.getElementById('result-count').textContent = `${list.length}곡`;
    document.getElementById('result-list').innerHTML = list.map((s, i) => `
      <div class="result-item" onclick="previewSong(${s.id})" data-id="${s.id}">
        <div class="result-num">${String(i+1).padStart(2,'0')}</div>
        <div class="result-info">
          <div class="result-title">${s.title}</div>
          <div class="result-artist">${s.artist}</div>
        </div>
        <div class="result-tags">${s.genres.map(g=>`<span class="result-tag">${g}</span>`).join('')}</div>
        <div class="result-play-icon">▶</div>
      </div>`).join('');
    document.getElementById('results').classList.add('visible');
    window._resultSongs = list;
    previewSong(list[0].id);
  }

  function extractVideoId(url) {
    const m = url.match(/[?&]v=([^&]+)/);
    return m ? m[1] : null;
  }

  function previewSong(id) {
    const s = (window._resultSongs || []).find(x => x.id === id);
    if (!s) return;
    document.querySelectorAll('.result-item').forEach(el => {
      el.classList.toggle('playing', el.dataset.id == id);
      el.querySelector('.result-play-icon').textContent = el.dataset.id == id ? '■' : '▶';
    });
    document.getElementById('preview-song-title').textContent = s.title;
    document.getElementById('preview-song-artist').textContent = s.artist;
    document.getElementById('preview-open-btn').href = s.youtube;
    const embedEl = document.getElementById('preview-embed');
    const videoId = extractVideoId(s.youtube);
    if (videoId) {
      embedEl.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
    } else {
      embedEl.innerHTML = `<div class="preview-placeholder">
        <div class="preview-placeholder-icon">♪</div>
        <div style="font-size:0.78em;color:var(--text);text-align:center;padding:0 20px;line-height:1.8">${s.title}<br><span style="color:var(--muted);font-size:0.9em">${s.artist}</span></div>
        <div class="preview-placeholder-text">유튜브 검색으로 이동</div>
      </div>`;
    }
  }

  /* ── 픽업 셀렉터 — 원근감 세로 토글 ── */
  const THEMES = [
    { cls: '',            name: 'SUNBURST'    },
    { cls: 'theme-white', name: 'ALPINE WHITE'},
    { cls: 'theme-ebony', name: 'EBONY'       },
  ];
  const ACTIVE_COLORS = { '': '#c9a84c', 'theme-white': '#8b3a1a', 'theme-ebony': '#d0d0d0' };
  const MUTED_COLOR   = '#6b5840';

  // 피벗(봉 뿌리): 항상 cx=45, cy=60 (원 중심)
  // 포지션별 팁 위치 & 원근 파라미터
  //   tipCy   : 팁 중심 y
  //   tipRx   : 팁 가로 반지름
  //   tipRy   : 팁 세로 반지름 (원근: 위=크게, 중=중간, 아래=크게)
  //   shaftW  : 봉 폭 (가까울수록 넓어 보임)
  //   hiCyOff : 하이라이트 위치 오프셋
  const POS = [
    // NECK — 위: 윗부분 크게 (ryTop 큼), 봉이 중앙→위
    { tipCy: 36, tipRx: 9, tipRyTop: 14, tipRyBot: 6,  shaftWPiv: 4, shaftWTip: 7 },
    // MID  — 중앙: 위아래 대칭 세로 타원
    { tipCy: 60, tipRx: 8, tipRyTop: 11, tipRyBot: 11, shaftWPiv: 4, shaftWTip: 4 },
    // BRIDGE — 아래: 아랫부분 크게 (ryBot 큼), 봉이 중앙→아래
    { tipCy: 84, tipRx: 9, tipRyTop: 6,  tipRyBot: 14, shaftWPiv: 7, shaftWTip: 4 },
  ];

  function drawLever(idx) {
    const p  = POS[idx];
    const cx = 45, cy = 60;
    const ns = 'http://www.w3.org/2000/svg';
    const g  = document.getElementById('lever-group');
    g.innerHTML = '';

    const tx = cx, ty = p.tipCy;
    const rx = p.tipRx, ryT = p.tipRyTop, ryB = p.tipRyBot;

    // ── 봉: 피벗(cy=60)에서 팁 방향으로 뻗는 사다리꼴 ──
    let shaftPath;
    if (idx === 0) {
      // 위로: 피벗쪽 좁고 팁쪽 넓음
      const endY = ty + ryB;
      shaftPath = `M${cx - p.shaftWPiv/2},${cy} L${cx + p.shaftWPiv/2},${cy} L${cx + p.shaftWTip/2},${endY} L${cx - p.shaftWTip/2},${endY} Z`;
    } else if (idx === 2) {
      // 아래로: 피벗쪽 넓고 팁쪽 좁음 (원근상 반대)
      const endY = ty - ryT;
      shaftPath = `M${cx - p.shaftWPiv/2},${cy} L${cx + p.shaftWPiv/2},${cy} L${cx + p.shaftWTip/2},${endY} L${cx - p.shaftWTip/2},${endY} Z`;
    } else {
      // 중앙: 위아래 양쪽으로 균등하게
      const hw = p.shaftWPiv / 2;
      shaftPath = `M${cx - hw},${cy - ryT} L${cx + hw},${cy - ryT} L${cx + hw},${cy + ryB} L${cx - hw},${cy + ryB} Z`;
    }

    // 봉 그림자
    const ss = document.createElementNS(ns, 'path');
    ss.setAttribute('d', shaftPath); ss.setAttribute('fill', 'rgba(0,0,0,0.45)');
    ss.setAttribute('transform', 'translate(1.5,2)'); g.appendChild(ss);
    // 봉 본체
    const sh = document.createElementNS(ns, 'path');
    sh.setAttribute('d', shaftPath); sh.setAttribute('fill', 'url(#shaftG)'); g.appendChild(sh);
    // 봉 하이라이트
    const shl = document.createElementNS(ns, 'line');
    const y1 = idx === 0 ? cy : cy - ryT, y2 = idx === 0 ? ty + ryB : idx === 2 ? ty - ryT : cy + ryB;
    shl.setAttribute('x1', cx - 0.4); shl.setAttribute('y1', Math.min(y1,y2));
    shl.setAttribute('x2', cx - 0.4); shl.setAttribute('y2', Math.max(y1,y2));
    shl.setAttribute('stroke', 'rgba(255,255,255,0.07)'); shl.setAttribute('stroke-width', '1');
    g.appendChild(shl);

    // ── 팁: 비대칭 세로 타원 (위 ryTop, 아래 ryBot) ──
    const tipPath = `M${tx - rx},${ty} C${tx - rx},${ty - ryT} ${tx + rx},${ty - ryT} ${tx + rx},${ty} C${tx + rx},${ty + ryB} ${tx - rx},${ty + ryB} ${tx - rx},${ty} Z`;

    // 팁 그림자
    const ts = document.createElementNS(ns, 'path');
    ts.setAttribute('d', tipPath); ts.setAttribute('fill', 'rgba(0,0,0,0.45)');
    ts.setAttribute('transform', 'translate(1.5,2.5)'); g.appendChild(ts);
    // 팁 본체
    const tip = document.createElementNS(ns, 'path');
    tip.setAttribute('d', tipPath); tip.setAttribute('fill', 'url(#tipG)');
    tip.setAttribute('stroke', '#8a7040'); tip.setAttribute('stroke-width', '0.7');
    g.appendChild(tip);
    // 좌우 어두운 엣지
    const te = document.createElementNS(ns, 'path');
    te.setAttribute('d', tipPath); te.setAttribute('fill', 'url(#rimSideG)'); g.appendChild(te);
    // 하이라이트: 위쪽에 집중
    const hiCy = ty - ryT * 0.42;
    const hi = document.createElementNS(ns, 'ellipse');
    hi.setAttribute('cx', tx - rx * 0.15); hi.setAttribute('cy', hiCy);
    hi.setAttribute('rx', rx * 0.44); hi.setAttribute('ry', ryT * 0.3);
    hi.setAttribute('fill', 'rgba(255,252,240,0.82)'); g.appendChild(hi);
    // 테두리 광택
    const tr = document.createElementNS(ns, 'path');
    tr.setAttribute('d', tipPath); tr.setAttribute('fill', 'none');
    tr.setAttribute('stroke', 'rgba(255,255,255,0.18)'); tr.setAttribute('stroke-width', '0.5');
    g.appendChild(tr);
  }

  let currentTheme = 0;

  function setTheme(idx) {
    currentTheme = idx;
    const root      = document.documentElement;
    const nameBadge = document.getElementById('theme-name');

    THEMES.forEach(t => { if (t.cls) root.classList.remove(t.cls); });
    const t = THEMES[idx];
    if (t.cls) root.classList.add(t.cls);

    drawLever(idx);

    const ac = ACTIVE_COLORS[t.cls];
    const l0 = document.getElementById('svg-lbl-0');
    const l2 = document.getElementById('svg-lbl-2');
    if (l0) l0.setAttribute('fill', idx === 0 ? ac : MUTED_COLOR);
    if (l2) l2.setAttribute('fill', idx === 2 ? ac : MUTED_COLOR);

    nameBadge.textContent = t.name;
    requestAnimationFrame(() => requestAnimationFrame(() => updateKnobSVGs()));
  }

  // 스크롤로 픽업 변경
  document.getElementById('pickup-svg').addEventListener('wheel', e => {
    e.preventDefault();
    const next = Math.max(0, Math.min(THEMES.length - 1, currentTheme + (e.deltaY > 0 ? 1 : -1)));
    if (next !== currentTheme) setTheme(next);
  }, { passive: false });

  // 터치 스와이프 지원
  let touchStartY = 0;
  const svgEl = document.getElementById('pickup-svg');
  svgEl.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
  svgEl.addEventListener('touchend', e => {
    const dy = touchStartY - e.changedTouches[0].clientY;
    if (Math.abs(dy) < 10) return;
    const next = Math.max(0, Math.min(THEMES.length - 1, currentTheme + (dy > 0 ? 1 : -1)));
    if (next !== currentTheme) setTheme(next);
  }, { passive: true });
